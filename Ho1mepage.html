<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homepage</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e24;
            --text-color: #e4e4e7;
            --accent-color: #5294e2;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 650px;
            text-align: center;
        }
        #clock {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
        }
        form {
            width: 100%;
            margin-bottom: 2.5rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #3f3f46;
            border-radius: 30px;
            background-color: var(--card-bg);
            color: var(--text-color);
            box-sizing: border-box;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: var(--accent-color);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }
        .tile {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: transform 0.2s, border-color 0.2s;
            border: 1px solid transparent;
        }
        .tile:hover {
            transform: translateY(-3px);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Live Clock -->
        <div id="clock">00:00</div>

        <!-- Google Search Bar -->
        <form action="https://google.com" method="get">
            <input type="text" name="q" placeholder="Search the web..." autofocus autocomplete="off">
        </form>

        <!-- Shortcut Links Grid -->
        <div class="grid">
            <!-- Edit these links to whatever you want -->
            <a href="https://github.com" class="tile">GitHub</a>
            <a href="https://youtube.com" class="tile">YouTube</a>
            <a href="https://reddit.com" class="tile">Reddit</a>
            <a href="https://gmail.com" class="tile">Gmail</a>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>

</body>
</html>
